        .container {

        .btn-primary {

        .btn-secondary {

            transform: translateY(-2px);

        .footer {
            margin-top: 32px;

            border-top: 1px solid #e8e8e8;

        }

        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading .spinner {
            display: block;
        }

        .loading .buttons {
            display: none;

        @media (max-width: 480px) {

<body>
    <div class="container">
        <div class="logo">🎬</div>
        <h1>Creepy Shorts</h1>
        <p>Watch amazing short videos. Get the app to enjoy unlimited entertainment!</p>

        <div class="spinner"></div>

        <div class="buttons">
            <a href="#" id="openAppBtn" class="btn btn-primary">
                📱 Open in App
            </a>

            <a href="https://play.google.com/store/apps/details?id=com.victorsaulmendozamena.creepyshorts"
                id="playStoreBtn" class="btn btn-secondary" target="_blank" rel="noopener noreferrer">

                        d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.15L13.69,12L3.84,21.85C3.34,21.6 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12.85L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,11.15L6.05,2.66Z" />

                    <path
                        d="M18.71,19.5C17.88,20.74 17,21.95 15.66,21.97C14.32,22 13.89,21.18 12.37,21.18C10.84,21.18 10.37,21.95 9.1,22C7.79,22.05 6.8,20.68 5.96,19.47C4.25,17 2.94,12.45 4.7,9.39C5.57,7.87 7.13,6.91 8.82,6.88C10.1,6.86 11.32,7.75 12.11,7.75C12.89,7.75 14.37,6.68 15.92,6.84C16.57,6.87 18.39,7.1 19.56,8.82C19.47,8.88 17.39,10.1 17.41,12.63C17.44,15.65 20.06,16.66 20.09,16.67C20.06,16.74 19.67,18.11 18.71,19.5M13,3.5C13.73,2.67 14.94,2.04 15.94,2C16.07,3.17 15.6,4.35 14.9,5.19C14.21,6.04 13.07,6.7 11.95,6.61C11.8,5.46 12.36,4.26 13,3.5Z" />
                </svg>
                App Store
            </a>
        </div>

        <div class="footer">
            © 2026 Creepy Shorts. All rights reserved.
        </div>
    </div>

    <script>
        // Get video ID from URL if present
        const urlParams = new URLSearchParams(window.location.search);
        const pathParts = window.location.pathname.split('/');
        let videoId = null;

        // Check if URL matches /shorts/:videoId pattern
        if (pathParts[1] === 'shorts' && pathParts[2]) {
            videoId = pathParts[2];
        }

        // Deep link URLs
        const customSchemeUrl = videoId
            ? `creepyshorts://shorts/${videoId}`
            : 'creepyshorts://';

        const universalLinkUrl = videoId
            ? `https://api.creepy-shorts.com/shorts/${videoId}`
            : 'https://api.creepy-shorts.com/';

        // Function to detect mobile OS
        function getMobileOS() {
            const ua = navigator.userAgent;
            if (/android/i.test(ua)) {
                return "Android";
            } else if (/iPad|iPhone|iPod/.test(ua) && !window.MSStream) {
                return "iOS";
            }
            return "Other";
        }

        // Auto-open app on mobile
        const os = getMobileOS();
        if (os === "Android" || os === "iOS") {
            // Show loading state
            document.querySelector('.container').classList.add('loading');

            // Try to open the app
            setTimeout(() => {
                window.location.href = customSchemeUrl;

                // If app doesn't open in 2 seconds, show download buttons
                setTimeout(() => {
                    document.querySelector('.container').classList.remove('loading');
                }, 2000);
            }, 500);
        }

        // Open app button handler
        document.getElementById('openAppBtn').addEventListener('click', (e) => {
            e.preventDefault();
            window.location.href = customSchemeUrl;

            // Fallback to store after 2 seconds if app not installed
            setTimeout(() => {
                if (os === "Android") {
                    window.location.href = document.getElementById('playStoreBtn').href;
                } else if (os === "iOS") {
                    window.location.href = document.getElementById('appStoreBtn').href;
                }
            }, 2000);
        });

        // Update page title if viewing specific video
        if (videoId) {
            document.title = `Watch Video - Creepy Shorts`;
            document.querySelector('p').textContent = 'Open the app to watch this video!';
        }

        // Hide App Store button on Android, Play Store button on iOS
        if (os === "Android") {
            document.getElementById('appStoreBtn').style.display = 'none';
        } else if (os === "iOS") {
            document.getElementById('playStoreBtn').style.display = 'none';
        }

        // Desktop: show message to open on mobile
        if (os === "Other") {
            document.querySelector('p').innerHTML =
                'Please open this link on your mobile device<br>to download the app!';
            document.getElementById('openAppBtn').style.display = 'none';
        }
    </script>
